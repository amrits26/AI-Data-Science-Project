app = "imperial-cars-ai"
primary_region = "ord"

[build]
dockerfile = "./Dockerfile"

[env]
APP_ENV = "production"
PORT = "8000"
OLLAMA_MODEL = "deepseek-r1:14b"

[[services]]
protocol = "tcp"
internal_port = 8000
processes = ["app"]

  [[services.ports]]
  port = 80
  handlers = ["http"]
  force_https = true

  [[services.ports]]
  port = 443
  handlers = ["tls", "http"]

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 1

  [http_service.checks]
  interval = "30s"
  timeout = "5s"
  method = "GET"
  path = "/api/health"

[[vm]]
memory = "512mb"
cpus = 1
cpu_kind = "performance"
processes = ["app"]
