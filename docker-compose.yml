services:
  api:
    build: .
    container_name: imperial_api
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://imperial_admin:${POSTGRES_PASSWORD}@postgres:5432/imperial_dealership
      - WATCHDOG_BACKEND_PORT=8081
      - CORS_ORIGINS=http://localhost:8501,http://localhost:3000
      - TRUSTED_HOSTS=localhost,127.0.0.1,.imperialcars.local
      - APP_ENV=production
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  streamlit:
    build: .
    container_name: imperial_streamlit
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://imperial_admin:${POSTGRES_PASSWORD}@postgres:5432/imperial_dealership
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    ports:
      - "8501:8501"
    depends_on:
      - api

  postgres:
    image: pgvector/pgvector:pg16
    container_name: imperial_postgres
    environment:
      POSTGRES_DB: imperial_dealership
      POSTGRES_USER: imperial_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "55433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
